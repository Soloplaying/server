# 레포지트리(영문): https://github.com/IzzelAliz/Arclight
# 이슈 트래커(영문, 중문): https://github.com/IzzelAliz/Arclight/issues
# 
# 
# Config version number, do not edit.
"_v"=1
# Async Catcher 관련 설정
# 네 개의 모드가 있으며, BLOCK로 설정하는 것을 권장합니다.
# NONE - 아무 것도 하지 않음
# DISPATCH - 주 스레드에 올리지 않고 백그라운드에서 실행
# BLOCK - 주 스레드에 올리고 결과를 대기
# EXCEPTION - 오류를 발생
async-catcher {
    defaultOperation=block
    # 스택 추적 덤프 정보는 debug.log에 있습니다.
    dump=true
    overrides {}
    warn=true
}
compatibility {
    entity-property-overrides {}
    # 별도 세계 작동 로직
    # 제대로 작동하지 않는 모드가 있다면, 로그 파일에서 [EXT_LOGIC]와 관련된 클래스 명을
    #  찾아 여기에 추가해 주세요.
    extra-logic-worlds=[
        "com.example.mod.ExtraLogicWorld"
    ]
    # true - Forge의 권한 쿼리를 Bukkit으로 넘깁니다.
    # false - 권한 넘기기를 비활성화합니다.
    # reverse - Bukkit의 권한 쿼리를 Forge로 넘깁니다.
    forward-permission=true
    # 允许空 NBT 标签的物品和没有 NBT 标签的物品堆叠
    lenient-item-tag-match=true
    material-property-overrides {}
    # 버킷 포맷에 맞도록 모드 차원 폴더에 대한 Symbolic Link를 생성합니다.
    # 활성화하면 플러그인과의 호환성을 향상시킬 수 있습니다.
    # 이 설정을 수정하면 모드의 월드 명칭이 바뀌어 월드 명칭에 의존하는 플러그인의
    #  데이터 손실이 발생할 수 있습니다.
    # https://github.com/IzzelAliz/Arclight/wiki/World-Symlink (영문)에서 자세한
    #  내용을 확인하세요.
    symlink-world=false
    # 用户名合法检查正则表达式，留空为使用原版检查
    # 如果需要允许中文字符可以使用
    # valid-username-regex = "^[ -~\p{sc=Han}]{1,16}$"
    # 如果允许任何用户名可以使用
    # valid-username-regex = ".+"
    valid-username-regex=""
}
# 언어/I18n 설정
locale {
    current="ko_kr"
    fallback="zh_cn"
}
# 최적화 관련 설정
optimization {
    cache-plugin-class=true
    # 레벨 데이터 업그레이드에 이용되는 DataFixerUpper 시스템을 비활성화합니다.
    # 서버 시작과 월드 로드 속도를 올리고, 메모리 사용량을 80~200MB까지 줄일 수 있습니다.
    # Arclight 및 개발자는 데이터 손실을 책임지지 않습니다.
    # 상용 서버에서는 사용하지 마십시오!
    disable-data-fixer=false
    # 목표 선택기가 업데이트되는 시간(틱 단위)을 설정합니다.
    # 높은 값은 더 적은 리소스를 소모합니다.
    # 대신 몹의 목표 변경이 덜 자주 일어나게 됩니다.
    goal-selector-update-interval=2
}
